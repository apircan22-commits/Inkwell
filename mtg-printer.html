<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MTG Card Printer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap');
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

  :root { --t:.25s ease; --radius:10px; }
  [data-theme="dark"] {
    --bg:#0b0d0e; --bg2:#101214; --text:#e8e6e2; --text-mid:#a8a6a2; --text-dim:#706e6a; --text-faint:#504e4a;
    --surface:#181a1c; --surface2:#1e2022; --border:#2a2c2e; --border-hover:#484a4c;
    --card-shadow:rgba(0,0,0,.7);
    --accent:#3db870; --accent-text:#e0f8ea; --accent-dim:#2a8050;
    --accent-bg:rgba(61,184,112,.08); --accent-border:rgba(61,184,112,.3); --accent-glow:rgba(61,184,112,.2);
    --ghost:#1a1c1e; --ghost-hover:#222426; --ghost-text:#908e8a;
    --status-bg:rgba(61,184,112,.06); --status-glow:rgba(61,184,112,.25);
    --fail:#e06060; --fail-bg:rgba(224,96,96,.08);
    --peek-bg:rgba(0,0,0,.92);
    --spinner-track:#2a2c2e;
    --overlay:rgba(11,13,14,.5);
    --warn:#d4a030; --warn-bg:rgba(212,160,48,.08); --warn-border:rgba(212,160,48,.3);
    --texture:url("data:image/svg+xml,%3Csvg width='40' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.015'/%3E%3C/svg%3E");
  }
  [data-theme="light"] {
    --bg:#f0ece6; --bg2:#e8e4de; --text:#1a1816; --text-mid:#5a5856; --text-dim:#8a8886; --text-faint:#a8a6a4;
    --surface:#e0dcd6; --surface2:#d8d4ce; --border:#c8c4be; --border-hover:#a8a4a0;
    --card-shadow:rgba(0,0,0,.15);
    --accent:#1d7a42; --accent-text:#fff; --accent-dim:#166834;
    --accent-bg:rgba(29,122,66,.06); --accent-border:rgba(29,122,66,.25); --accent-glow:rgba(29,122,66,.12);
    --ghost:#d8d4ce; --ghost-hover:#ccc8c2; --ghost-text:#6a6866;
    --status-bg:rgba(29,122,66,.06); --status-glow:rgba(29,122,66,.15);
    --fail:#c03030; --fail-bg:rgba(192,48,48,.06);
    --peek-bg:rgba(0,0,0,.85);
    --spinner-track:#c8c4be;
    --overlay:rgba(240,236,230,.5);
    --warn:#a07820; --warn-bg:rgba(160,120,32,.06); --warn-border:rgba(160,120,32,.25);
    --texture:url("data:image/svg+xml,%3Csvg width='40' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.025'/%3E%3C/svg%3E");
  }

  html, body {
    min-height:100dvh; background:var(--bg); color:var(--text);
    font-family:'Cormorant Garamond',Georgia,serif; overflow-x:hidden;
    -webkit-tap-highlight-color:transparent; transition:background var(--t), color var(--t);
  }
  body::before {
    content:''; position:fixed; inset:0; background:var(--texture); pointer-events:none; z-index:0;
  }

  .app { position:relative; z-index:1; max-width:440px; margin:0 auto; padding:0 16px 32px; }
  .screen { display:none; }
  .screen.active { display:flex; flex-direction:column; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)} }
  @keyframes spin { to{transform:rotate(360deg)} }
  @keyframes pulse { 0%,100%{opacity:.6} 50%{opacity:1} }
  @keyframes summonFlash { 0%{box-shadow:0 0 0 0 var(--accent-glow)} 50%{box-shadow:0 0 0 20px transparent} 100%{box-shadow:0 0 0 0 transparent} }
  @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
  @keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }

  /* ── Header ── */
  .header {
    display:flex; justify-content:space-between; align-items:center;
    padding:16px 0; position:sticky; top:0; z-index:10;
    background:var(--bg); transition:background var(--t);
  }
  .header::after {
    content:''; position:absolute; bottom:0; left:-16px; right:-16px; height:1px;
    background:var(--border); transition:background var(--t);
  }
  .header-title {
    font-family:'Cinzel',serif; font-size:14px; font-weight:700;
    color:var(--text-dim); letter-spacing:5px; text-transform:uppercase; transition:color var(--t);
  }
  .header-actions { display:flex; gap:8px; align-items:center; }

  /* ── Icon buttons ── */
  .icon-btn {
    width:36px; height:36px; border-radius:8px; border:1px solid var(--border);
    background:var(--surface); color:var(--text-dim); font-size:15px;
    cursor:pointer; transition:all .15s; display:flex; align-items:center; justify-content:center;
  }
  .icon-btn:hover { border-color:var(--border-hover); color:var(--text); background:var(--surface2); }
  .icon-btn:active { transform:scale(.95); }

  /* ── Badge button ── */
  .badge-btn {
    display:inline-flex; align-items:center; gap:6px;
    padding:7px 14px; border-radius:8px; border:1px solid var(--border);
    background:var(--surface); color:var(--text-mid); font-size:13px;
    font-family:'Cormorant Garamond',serif; font-weight:600;
    cursor:pointer; transition:all .15s; white-space:nowrap;
  }
  .badge-btn:hover { border-color:var(--border-hover); color:var(--text); }
  .badge-btn:active { transform:scale(.97); }
  .badge-btn .badge-count {
    display:inline-flex; align-items:center; justify-content:center;
    min-width:20px; height:20px; border-radius:10px; padding:0 6px;
    background:var(--accent); color:var(--accent-text);
    font-family:'Cinzel',serif; font-size:10px; font-weight:700;
  }

  /* ── Section labels ── */
  .section-label {
    font-family:'Cinzel',serif; font-size:11px; font-weight:700;
    color:var(--text-faint); letter-spacing:3px; text-transform:uppercase;
    padding:4px 0 12px; transition:color var(--t);
  }

  /* ── Buttons ── */
  .btn {
    cursor:pointer; border:none; outline:none; font-family:'Cinzel',serif;
    font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
    padding:14px 28px; border-radius:var(--radius); font-size:15px; transition:all .2s;
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
  }
  .btn:active:not(:disabled) { transform:scale(.97); }
  .btn:disabled { opacity:.3; cursor:not-allowed; }
  .btn-primary {
    background:var(--accent); color:var(--accent-text);
    box-shadow:0 2px 16px var(--accent-glow), 0 1px 3px rgba(0,0,0,.2);
  }
  .btn-primary:hover:not(:disabled) { filter:brightness(1.1); box-shadow:0 4px 24px var(--accent-glow); }
  .btn-secondary {
    background:var(--surface); color:var(--text-mid); border:1px solid var(--border);
    box-shadow:0 1px 3px rgba(0,0,0,.08);
  }
  .btn-secondary:hover:not(:disabled) { color:var(--text); border-color:var(--border-hover); background:var(--surface2); }
  .btn-ghost { background:none; color:var(--text-dim); padding:10px 16px; letter-spacing:1px; font-size:13px; }
  .btn-ghost:hover { color:var(--text); }

  /* ── Toggle group ── */
  .setup-row {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 0; border-bottom:1px solid var(--border); transition:border-color var(--t);
  }
  .setup-label { color:var(--text-mid); font-size:15px; font-weight:600; transition:color var(--t); }
  .toggle-group { display:flex; gap:4px; }
  .toggle-btn {
    padding:8px 14px; border-radius:8px; border:1px solid var(--border); background:var(--surface);
    color:var(--text-dim); font-size:14px; font-weight:600; cursor:pointer; transition:all .15s;
    font-family:'Cormorant Garamond',serif;
  }
  .toggle-btn:active { transform:scale(.95); }
  .toggle-btn.on {
    border-color:var(--accent-border); color:var(--accent); background:var(--accent-bg);
  }

  /* ── Copies stepper ── */
  .copies-stepper {
    display:flex; align-items:center; gap:0; border-radius:var(--radius);
    border:1px solid var(--border); background:var(--surface); overflow:hidden; flex-shrink:0;
  }
  .stepper-btn {
    width:44px; height:44px; border:none; background:none; color:var(--text-mid);
    font-size:20px; font-weight:700; cursor:pointer; transition:all .15s;
    display:flex; align-items:center; justify-content:center; font-family:'Cinzel',serif;
  }
  .stepper-btn:active { background:var(--surface2); transform:scale(.93); }
  .stepper-btn:hover { color:var(--text); }
  .stepper-val {
    width:32px; text-align:center; font-family:'Cinzel',serif; font-size:16px;
    font-weight:700; color:var(--accent); user-select:none;
  }

  /* ── Search ── */
  .search-wrap {
    position:relative; margin:16px 0 8px;
  }
  .search-input {
    width:100%; padding:14px 16px 14px 44px; border-radius:var(--radius);
    border:1.5px solid var(--border); background:var(--surface);
    color:var(--text); font-family:'Cormorant Garamond',serif;
    font-size:17px; font-weight:600; outline:none; transition:all .2s;
  }
  .search-input::placeholder { color:var(--text-faint); }
  .search-input:focus { border-color:var(--accent-border); background:var(--accent-bg); }
  .search-icon {
    position:absolute; left:14px; top:50%; transform:translateY(-50%);
    color:var(--text-faint); font-size:18px; pointer-events:none;
  }
  .search-clear {
    position:absolute; right:12px; top:50%; transform:translateY(-50%);
    width:28px; height:28px; border-radius:6px; border:none;
    background:var(--surface2); color:var(--text-dim); font-size:14px;
    cursor:pointer; display:none; align-items:center; justify-content:center;
    transition:all .15s;
  }
  .search-clear:hover { color:var(--text); }
  .search-clear.show { display:flex; }

  /* ── Filter chips ── */
  .filter-row {
    display:flex; gap:6px; padding:4px 0 12px; overflow-x:auto;
    -webkit-overflow-scrolling:touch; scrollbar-width:none;
  }
  .filter-row::-webkit-scrollbar { display:none; }
  .filter-chip {
    padding:7px 14px; border-radius:20px; border:1px solid var(--border); background:var(--surface);
    color:var(--text-dim); font-size:13px; font-weight:600; cursor:pointer; transition:all .15s;
    font-family:'Cormorant Garamond',serif; white-space:nowrap; flex-shrink:0;
  }
  .filter-chip:active { transform:scale(.95); }
  .filter-chip.on {
    border-color:var(--accent-border); color:var(--accent); background:var(--accent-bg);
  }

  /* ── Results grid ── */
  .results-grid {
    display:grid; grid-template-columns:repeat(3, 1fr); gap:8px;
    padding:4px 0 160px;
  }
  .result-card {
    position:relative; border-radius:10px; overflow:hidden; cursor:pointer;
    border:1.5px solid var(--border); background:var(--surface);
    transition:all .2s; aspect-ratio:488/680;
  }
  .result-card:active { transform:scale(.96); }
  .result-card:hover { border-color:var(--border-hover); }
  .result-card.selected { border-color:var(--accent); box-shadow:0 0 16px var(--accent-glow); }
  .result-card img {
    width:100%; height:100%; object-fit:cover; display:block;
    background:var(--surface2);
  }
  .result-dfc-badge {
    position:absolute; top:4px; right:4px;
    width:22px; height:22px; border-radius:5px;
    background:rgba(0,0,0,.7); color:var(--accent);
    font-size:12px; display:flex; align-items:center; justify-content:center;
    backdrop-filter:blur(4px); border:1px solid var(--accent-border);
  }
  .result-card .queued-badge {
    position:absolute; top:4px; left:4px;
    padding:2px 7px; border-radius:5px;
    background:var(--accent); color:var(--accent-text);
    font-family:'Cinzel',serif; font-size:10px; font-weight:700;
  }

  /* ── Loading / empty states ── */
  .results-empty {
    text-align:center; color:var(--text-faint); padding:48px 20px;
    font-style:italic; font-size:16px;
  }
  .results-loading {
    text-align:center; padding:48px 20px; color:var(--text-dim);
  }
  .load-more-btn {
    padding:12px; border-radius:var(--radius); border:1px solid var(--border);
    background:var(--surface); color:var(--text-mid); font-size:14px; font-weight:600;
    cursor:pointer; transition:all .15s; text-align:center; width:100%;
    font-family:'Cormorant Garamond',serif; grid-column:1/-1;
  }
  .load-more-btn:hover { border-color:var(--border-hover); color:var(--text); }
  .load-more-btn:active { transform:scale(.98); }

  /* ── Detail view ── */
  .detail-body { padding-top:16px; padding-bottom:160px; }
  .detail-img-wrap {
    text-align:center; padding:8px 0 16px; position:relative;
  }
  .detail-img-wrap img {
    width:100%; max-width:300px; border-radius:14px;
    box-shadow:0 12px 40px var(--card-shadow), 0 2px 8px var(--card-shadow);
    transition:all .4s;
  }
  .detail-img-wrap img.flipping { transform:rotateY(90deg); }
  .detail-flip-btn {
    position:absolute; bottom:24px; right:calc(50% - 150px + 8px);
    width:40px; height:40px; border-radius:50%;
    background:rgba(0,0,0,.7); color:#fff; border:1px solid rgba(255,255,255,.2);
    font-size:18px; cursor:pointer; transition:all .15s;
    display:flex; align-items:center; justify-content:center;
    backdrop-filter:blur(4px);
  }
  .detail-flip-btn:active { transform:scale(.9); }
  .detail-name {
    font-family:'Cinzel',serif; font-size:22px; font-weight:700;
    color:var(--text); text-align:center; line-height:1.3;
  }
  .detail-type {
    font-size:15px; color:var(--text-dim); text-align:center; margin-top:4px;
  }
  .detail-meta {
    display:flex; justify-content:center; gap:16px; margin-top:12px; flex-wrap:wrap;
  }
  .detail-meta-item {
    padding:6px 14px; border-radius:8px; border:1px solid var(--border);
    background:var(--surface); font-size:13px; color:var(--text-mid);
    font-family:'Cormorant Garamond',serif; font-weight:600;
  }
  .detail-oracle {
    margin:16px 0; padding:16px; border-radius:var(--radius);
    border:1px solid var(--border); background:var(--surface);
    font-size:15px; color:var(--text-mid); line-height:1.7;
    white-space:pre-line;
  }
  .detail-actions {
    display:flex; gap:10px; padding:16px 0; align-items:stretch;
  }

  /* ── Sticky bottom bar ── */
  .action-bar {
    position:fixed; bottom:0; left:0; right:0; z-index:50;
    padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    background:var(--bg); border-top:1px solid var(--border);
    transition:background var(--t), border-color var(--t);
    display:flex; justify-content:center; gap:10px;
  }
  .action-bar::before {
    content:''; position:absolute; top:-20px; left:0; right:0; height:20px;
    background:linear-gradient(to top, var(--bg), transparent); pointer-events:none;
  }
  .action-bar .btn { flex:1; max-width:440px; padding:16px 28px; font-size:15px; }

  /* ── Queue ── */
  .queue-list { padding:8px 0 160px; }
  .queue-item {
    display:flex; align-items:center; gap:12px; padding:14px 0;
    border-bottom:1px solid var(--border); transition:border-color var(--t);
    animation:fadeUp .3s ease;
  }
  .queue-item:last-child { border-bottom:none; }
  .queue-thumb {
    width:48px; height:67px; border-radius:6px; overflow:hidden; flex-shrink:0;
    border:1px solid var(--border);
  }
  .queue-thumb img { width:100%; height:100%; object-fit:cover; }
  .queue-info { flex:1; min-width:0; }
  .queue-name {
    font-size:16px; font-weight:600; color:var(--text);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .queue-type {
    font-size:13px; color:var(--text-dim); margin-top:2px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .queue-copies {
    font-size:13px; color:var(--accent); font-family:'Cinzel',serif; font-weight:700;
    flex-shrink:0;
  }
  .queue-remove {
    width:36px; height:36px; border-radius:8px; border:1px solid var(--border);
    background:var(--surface); color:var(--text-dim); font-size:16px;
    cursor:pointer; transition:all .15s;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .queue-remove:hover { border-color:rgba(224,96,96,.3); color:var(--fail); background:var(--fail-bg); }
  .queue-remove:active { transform:scale(.93); }
  .queue-empty {
    text-align:center; color:var(--text-faint); padding:48px 20px;
    font-style:italic; font-size:16px;
  }

  /* ── Status card ── */
  .status-card {
    margin:16px 0; padding:20px; border-radius:var(--radius);
    border:1px solid var(--border); background:var(--surface);
    text-align:center; transition:all .3s; animation:fadeUp .3s ease;
  }
  .status-card.printing {
    border-color:var(--accent-border); background:var(--status-bg);
    animation:fadeUp .3s ease, summonFlash 1.5s ease infinite;
  }
  .status-card.done { border-color:var(--accent-border); background:var(--status-bg); }
  .status-card.fail { border-color:rgba(224,96,96,.2); background:var(--fail-bg); }
  .status-card .status-icon { font-size:24px; margin-bottom:8px; display:block; }
  .status-card .status-msg { font-size:15px; color:var(--text-mid); }
  .spinner { display:inline-block; width:20px; height:20px; border:2px solid var(--spinner-track); border-top-color:var(--accent); border-radius:50%; animation:spin .5s linear infinite; vertical-align:middle; }
  .spinner-lg { width:28px; height:28px; }
  .shimmer-text {
    background:linear-gradient(90deg, var(--text-dim) 0%, var(--accent) 50%, var(--text-dim) 100%);
    background-size:200% 100%; -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent; animation:shimmer 2s ease infinite;
  }

  /* ── Peek overlay ── */
  .peek-overlay {
    position:fixed; inset:0; z-index:999; background:var(--peek-bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px;
    animation:fadeUp .2s ease;
  }
  .peek-overlay img {
    max-width:340px; width:100%; border-radius:14px;
    box-shadow:0 12px 48px rgba(0,0,0,.5); pointer-events:none;
    transition:transform .4s ease;
  }
  .peek-overlay img.flipping { transform:rotateY(90deg); }
  .peek-controls { display:flex; gap:10px; margin-top:16px; }
  .peek-ctrl-btn {
    padding:10px 24px; border-radius:8px; border:1px solid rgba(255,255,255,.2);
    background:rgba(255,255,255,.1); color:#fff; font-size:15px;
    font-family:'Cormorant Garamond',serif; font-weight:600;
    cursor:pointer; transition:all .15s; display:flex; align-items:center; gap:6px;
  }
  .peek-ctrl-btn:hover { background:rgba(255,255,255,.2); }
  .peek-ctrl-btn:active { transform:scale(.95); }
  .dfc-badge {
    display:inline-flex; align-items:center; justify-content:center;
    width:20px; height:20px; border-radius:4px; font-size:11px;
    background:var(--accent-bg); border:1px solid var(--accent-border); color:var(--accent);
    flex-shrink:0; margin-left:4px; vertical-align:middle;
  }

  /* ══════════ PRINT ══════════ */
  #print-zone { display:none; }

  @media print {
    * { background:transparent!important; box-shadow:none!important; text-shadow:none!important; }
    html,body { background:#fff!important; color:#000!important; margin:0!important; padding:0!important; min-height:0!important; overflow:visible!important; width:100%!important; }
    body::before { display:none!important; }
    .app, .action-bar { display:none!important; }
    #print-zone { display:block!important; margin:0!important; padding:0!important; overflow:visible!important; width:100%!important; }
    #print-zone .r-img { filter:none!important; -webkit-filter:none!important; }
    .receipt { width:100%; margin:0 0 2mm 0!important; padding:0!important; text-align:center; break-inside:avoid; page-break-inside:avoid; }
    .receipt:last-child { margin-bottom:0!important; }
  }

  .receipt { width:100%; margin:0 0 2mm 0; padding:0; text-align:center; }
  .receipt .r-img {
    display:block; margin:0 auto; padding:0; border-radius:0;
    width:100%; height:auto;
    image-rendering:pixelated;
  }
  .receipt .r-sep { margin:2mm auto 0; width:100%; border-top:3px dashed #000; }

  /* ── Tabs ── */
  .tab-row {
    display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:4px;
  }
  .tab-btn {
    flex:1; padding:12px 8px; border:none; background:none;
    color:var(--text-dim); font-family:'Cinzel',serif; font-size:12px;
    font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
    cursor:pointer; transition:all .15s; position:relative;
  }
  .tab-btn::after {
    content:''; position:absolute; bottom:-1px; left:16px; right:16px; height:2px;
    background:transparent; border-radius:1px; transition:background .15s;
  }
  .tab-btn.on { color:var(--accent); }
  .tab-btn.on::after { background:var(--accent); }
  .tab-btn:active { transform:scale(.97); }
</style>
</head>
<body>

<div id="print-zone"></div>

<div class="app">

  <!-- ═══════════════════ SEARCH SCREEN ═══════════════════ -->
  <div id="s-search" class="screen active">
    <div class="header">
      <div class="header-title">Card Printer</div>
      <div class="header-actions">
        <button class="badge-btn" id="queue-nav-btn" onclick="go('queue')" style="display:none;">
          Queue <span class="badge-count" id="queue-nav-count">0</span>
        </button>
        <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme"></button>
      </div>
    </div>

    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input class="search-input" id="search-input" type="text" placeholder="Search any card…" autocomplete="off" autocapitalize="off" spellcheck="false">
      <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
    </div>

    <div class="filter-row" id="filter-row">
      <button class="filter-chip on" data-filter="" onclick="setFilter(this)">All</button>
      <button class="filter-chip" data-filter="t:creature" onclick="setFilter(this)">Creature</button>
      <button class="filter-chip" data-filter="t:instant" onclick="setFilter(this)">Instant</button>
      <button class="filter-chip" data-filter="t:sorcery" onclick="setFilter(this)">Sorcery</button>
      <button class="filter-chip" data-filter="t:enchantment" onclick="setFilter(this)">Enchant</button>
      <button class="filter-chip" data-filter="t:artifact" onclick="setFilter(this)">Artifact</button>
      <button class="filter-chip" data-filter="t:planeswalker" onclick="setFilter(this)">Walker</button>
      <button class="filter-chip" data-filter="t:land" onclick="setFilter(this)">Land</button>
      <button class="filter-chip" data-filter="t:token" onclick="setFilter(this)">Token</button>
      <button class="filter-chip" data-filter="t:emblem" onclick="setFilter(this)">Emblem</button>
    </div>

    <div id="results-area">
      <div class="results-empty">Search for any Magic: The Gathering card, token, or emblem</div>
    </div>
  </div>

  <!-- ═══════════════════ DETAIL SCREEN ═══════════════════ -->
  <div id="s-detail" class="screen">
    <div class="header">
      <div class="header-title">Card Detail</div>
      <div class="header-actions">
        <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme"></button>
        <button class="badge-btn" onclick="go('search')">← Back</button>
      </div>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>

  <!-- ═══════════════════ QUEUE SCREEN ═══════════════════ -->
  <div id="s-queue" class="screen">
    <div class="header">
      <div class="header-title">Print Queue</div>
      <div class="header-actions">
        <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme"></button>
        <button class="badge-btn" onclick="go('search')">← Back</button>
      </div>
    </div>

    <div class="setup-row">
      <div class="setup-label">Paper</div>
      <div class="toggle-group" id="paper-btns">
        <button class="toggle-btn on" onclick="setPaper('2in')">2″</button>
        <button class="toggle-btn" onclick="setPaper('3in')">3″</button>
        <button class="toggle-btn" onclick="setPaper('4in')">4″</button>
      </div>
    </div>

    <div id="queue-list-area" class="queue-list"></div>

    <div id="queue-status-area"></div>
  </div>

  <!-- ═══════════════════ SETTINGS (inline on search) ═══════════════════ -->

</div>

<div id="peek" class="peek-overlay" style="display:none;"></div>

<!-- ═══════════════════ ACTION BAR ═══════════════════ -->
<div class="action-bar" id="action-bar" style="display:none;"></div>

<script>
// ══════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════
let searchResults = [];
let searchNextPage = null;
let searchQuery = '';
let activeFilter = '';
let selectedCard = null;
let detailFace = 0;
let printCopies = 1;
let printQueue = []; // {card, copies}
let searching = false;
let printing = false;
let currentScreen = 'search';
let searchDebounce = null;

// ══════════════════════════════════════════════════════════
// PAPER & PRINT CONFIG (exact copy from momir-papir.html)
// ══════════════════════════════════════════════════════════
const PAPER = {
  '2in': { total: 384 },
  '3in': { total: 576 },
  '4in': { total: 832 },
};
const CARD_W = 504;
let paperKey = '2in';

function setPaper(key) {
  paperKey = key;
  document.querySelectorAll('#paper-btns .toggle-btn').forEach(b =>
    b.classList.toggle('on', b.textContent.includes(key.charAt(0)))
  );
  try { localStorage.setItem('mtgp-paper', key); } catch(e) {}
}
(function() {
  try { const s = localStorage.getItem('mtgp-paper'); if (PAPER[s]) setPaper(s); } catch(e) {}
})();

// ══════════════════════════════════════════════════════════
// THEME (exact copy)
// ══════════════════════════════════════════════════════════
function getTheme() { return document.documentElement.getAttribute('data-theme'); }
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  try { localStorage.setItem('mtgp-theme', t); } catch(e) {}
  updateToggleIcons();
}
function toggleTheme() { setTheme(getTheme()==='dark'?'light':'dark'); }
function updateToggleIcons() {
  const icon = getTheme()==='dark' ? '☀' : '☾';
  document.querySelectorAll('.icon-btn[title="Toggle theme"]').forEach(b => b.textContent = icon);
}
(function() {
  try { const s = localStorage.getItem('mtgp-theme'); if (s) document.documentElement.setAttribute('data-theme', s); } catch(e) {}
  updateToggleIcons();
})();

// ══════════════════════════════════════════════════════════
// SCREENS
// ══════════════════════════════════════════════════════════
function go(s) {
  document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
  document.getElementById('s-'+s).classList.add('active');
  currentScreen = s;
  updateActionBar();
  if (s === 'queue') renderQueue();
  if (s === 'search') updateQueueNav();
}

function updateQueueNav() {
  const btn = document.getElementById('queue-nav-btn');
  const cnt = document.getElementById('queue-nav-count');
  if (printQueue.length) {
    btn.style.display = '';
    cnt.textContent = printQueue.length;
  } else {
    btn.style.display = 'none';
  }
}

// ══════════════════════════════════════════════════════════
// SCRYFALL API
// ══════════════════════════════════════════════════════════
let lastRequestTime = 0;
async function scryfallFetch(url) {
  const now = Date.now();
  const wait = Math.max(0, 55 - (now - lastRequestTime));
  if (wait > 0) await new Promise(r => setTimeout(r, wait));
  lastRequestTime = Date.now();
  const r = await fetch(url);
  if (!r.ok) {
    if (r.status === 404) return null;
    throw new Error('Scryfall ' + r.status);
  }
  return r.json();
}

function isDFC(card) {
  return !card.image_uris && card.card_faces?.length >= 2;
}

function getCardImage(card, face, size) {
  size = size || 'normal';
  if (card.image_uris) return card.image_uris[size] || card.image_uris.normal || '';
  if (card.card_faces?.length) {
    const f = card.card_faces[face || 0];
    return f?.image_uris?.[size] || f?.image_uris?.normal || '';
  }
  return '';
}

function getCardOracle(card) {
  if (card.oracle_text) return card.oracle_text;
  if (card.card_faces?.length) {
    return card.card_faces.map(f => f.name + '\n' + (f.oracle_text || '')).join('\n\n---\n\n');
  }
  return '';
}

// ══════════════════════════════════════════════════════════
// SEARCH
// ══════════════════════════════════════════════════════════
const searchInput = document.getElementById('search-input');
const searchClear = document.getElementById('search-clear');

searchInput.addEventListener('input', () => {
  const v = searchInput.value.trim();
  searchClear.classList.toggle('show', v.length > 0);
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => doSearch(), 300);
});

searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { clearTimeout(searchDebounce); doSearch(); }
});

function clearSearch() {
  searchInput.value = '';
  searchClear.classList.remove('show');
  searchResults = [];
  searchNextPage = null;
  searchQuery = '';
  renderResults();
  searchInput.focus();
}

function setFilter(el) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('on'));
  el.classList.add('on');
  activeFilter = el.dataset.filter;
  clearTimeout(searchDebounce);
  doSearch();
}

async function doSearch() {
  const text = searchInput.value.trim();
  // Build query
  let q = text;
  if (activeFilter) q = (q ? q + ' ' : '') + activeFilter;
  if (!q) {
    searchResults = [];
    searchNextPage = null;
    searchQuery = '';
    renderResults();
    return;
  }
  // Add default exclusion for un-cards
  q += ' -is:funny';
  if (q === searchQuery) return;
  searchQuery = q;
  searchResults = [];
  searchNextPage = null;
  searching = true;
  renderResults();

  try {
    const data = await scryfallFetch('https://api.scryfall.com/cards/search?q=' + encodeURIComponent(q) + '&unique=cards&order=name');
    if (!data) {
      searchResults = [];
      searching = false;
      renderResults();
      return;
    }
    searchResults = data.data || [];
    searchNextPage = data.has_more ? data.next_page : null;
  } catch(e) {
    searchResults = [];
  }
  searching = false;
  renderResults();
}

async function loadMore() {
  if (!searchNextPage || searching) return;
  searching = true;
  const btn = document.getElementById('load-more');
  if (btn) btn.textContent = 'Loading…';
  try {
    const data = await scryfallFetch(searchNextPage);
    if (data?.data) searchResults = searchResults.concat(data.data);
    searchNextPage = data?.has_more ? data.next_page : null;
  } catch(e) {}
  searching = false;
  renderResults();
}

function renderResults() {
  const area = document.getElementById('results-area');
  if (searching && !searchResults.length) {
    area.innerHTML = '<div class="results-loading"><span class="spinner spinner-lg"></span></div>';
    return;
  }
  if (!searchResults.length && !searchQuery) {
    area.innerHTML = '<div class="results-empty">Search for any Magic: The Gathering card, token, or emblem</div>';
    return;
  }
  if (!searchResults.length) {
    area.innerHTML = '<div class="results-empty">No cards found</div>';
    return;
  }
  let html = '<div class="results-grid">';
  searchResults.forEach((card, i) => {
    const img = getCardImage(card, 0, 'normal');
    const dfc = isDFC(card);
    const inQueue = printQueue.some(q => q.card.id === card.id);
    html += '<div class="result-card" onclick="selectCard('+i+')">';
    html += '<img src="' + esc(img) + '" alt="' + esc(card.name) + '" loading="lazy">';
    if (dfc) html += '<span class="result-dfc-badge">↷</span>';
    if (inQueue) html += '<span class="queued-badge">Q</span>';
    html += '</div>';
  });
  if (searchNextPage) {
    html += '<button class="load-more-btn" id="load-more" onclick="loadMore()">' + (searching ? 'Loading…' : 'Load more') + '</button>';
  }
  html += '</div>';
  area.innerHTML = html;
}

// ══════════════════════════════════════════════════════════
// CARD DETAIL
// ══════════════════════════════════════════════════════════
function selectCard(idx) {
  selectedCard = searchResults[idx];
  detailFace = 0;
  printCopies = 1;
  renderDetail();
  go('detail');
}

function renderDetail() {
  if (!selectedCard) return;
  const card = selectedCard;
  const dfc = isDFC(card);
  const img = getCardImage(card, detailFace, 'large');
  const typeLine = dfc ? card.card_faces[detailFace].type_line : (card.type_line || '');
  const name = dfc ? card.card_faces[detailFace].name : card.name;
  const oracle = getCardOracle(card);
  const power = dfc ? card.card_faces[detailFace].power : card.power;
  const toughness = dfc ? card.card_faces[detailFace].toughness : card.toughness;
  const loyalty = dfc ? card.card_faces[detailFace].loyalty : card.loyalty;

  let meta = '';
  if (card.set_name) meta += '<span class="detail-meta-item">' + esc(card.set_name) + '</span>';
  if (card.rarity) meta += '<span class="detail-meta-item" style="text-transform:capitalize;">' + esc(card.rarity) + '</span>';
  if (power != null && toughness != null) meta += '<span class="detail-meta-item">' + power + '/' + toughness + '</span>';
  if (loyalty) meta += '<span class="detail-meta-item">Loyalty: ' + loyalty + '</span>';
  if (card.mana_cost) meta += '<span class="detail-meta-item">' + esc(card.mana_cost) + '</span>';

  const body = document.getElementById('detail-body');
  body.innerHTML = `
    <div class="detail-img-wrap">
      <img id="detail-img" src="${esc(img)}" alt="${esc(name)}" crossorigin="anonymous">
      ${dfc ? '<button class="detail-flip-btn" onclick="flipDetail()">↷</button>' : ''}
    </div>
    <div class="detail-name">${esc(card.name)}${dfc ? ' <span class="dfc-badge">↷</span>' : ''}</div>
    <div class="detail-type">${esc(typeLine)}</div>
    ${meta ? '<div class="detail-meta">' + meta + '</div>' : ''}
    ${oracle ? '<div class="detail-oracle">' + esc(oracle) + '</div>' : ''}
    <div class="detail-actions">
      <div class="setup-row" style="flex:1;border:none;padding:8px 0;">
        <div class="setup-label">Copies</div>
        <div class="copies-stepper">
          <button class="stepper-btn" onclick="adjustDetailCopies(-1)">−</button>
          <span class="stepper-val" id="detail-copies">${printCopies}</span>
          <button class="stepper-btn" onclick="adjustDetailCopies(1)">+</button>
        </div>
      </div>
    </div>
    <div class="setup-row" style="border:none;">
      <div class="setup-label">Paper</div>
      <div class="toggle-group" id="paper-btns-detail">
        <button class="toggle-btn${paperKey==='2in'?' on':''}" onclick="setPaperAll('2in')">2″</button>
        <button class="toggle-btn${paperKey==='3in'?' on':''}" onclick="setPaperAll('3in')">3″</button>
        <button class="toggle-btn${paperKey==='4in'?' on':''}" onclick="setPaperAll('4in')">4″</button>
      </div>
    </div>
  `;
  updateActionBar();
}

function setPaperAll(key) {
  paperKey = key;
  document.querySelectorAll('#paper-btns .toggle-btn, #paper-btns-detail .toggle-btn').forEach(b =>
    b.classList.toggle('on', b.textContent.includes(key.charAt(0)))
  );
  try { localStorage.setItem('mtgp-paper', key); } catch(e) {}
}

function flipDetail() {
  if (!selectedCard || !isDFC(selectedCard)) return;
  const img = document.getElementById('detail-img');
  img.classList.add('flipping');
  setTimeout(() => {
    detailFace = detailFace === 0 ? 1 : 0;
    img.src = getCardImage(selectedCard, detailFace, 'large');
    img.classList.remove('flipping');
    // Update type line
    const typeLine = selectedCard.card_faces[detailFace].type_line;
    const typeEl = document.querySelector('.detail-type');
    if (typeEl) typeEl.textContent = typeLine;
  }, 200);
}

function adjustDetailCopies(d) {
  printCopies = Math.max(1, Math.min(10, printCopies + d));
  const el = document.getElementById('detail-copies');
  if (el) el.textContent = printCopies;
}

// ══════════════════════════════════════════════════════════
// ACTION BAR
// ══════════════════════════════════════════════════════════
function updateActionBar() {
  const bar = document.getElementById('action-bar');
  if (currentScreen === 'detail' && selectedCard) {
    bar.style.display = 'flex';
    bar.innerHTML = `
      <button class="btn btn-primary" onclick="printSelected()" ${printing?'disabled':''}>
        ${printing ? '<span class="spinner" style="border-top-color:var(--accent-text);border-color:rgba(255,255,255,.3);"></span>' : '🖨 Print'}
      </button>
      <button class="btn btn-secondary" onclick="addToQueue()" style="flex:.5;">+ Queue</button>
    `;
  } else if (currentScreen === 'queue' && printQueue.length) {
    bar.style.display = 'flex';
    bar.innerHTML = `
      <button class="btn btn-primary" onclick="printAllQueue()" ${printing?'disabled':''}>
        ${printing ? '<span class="spinner" style="border-top-color:var(--accent-text);border-color:rgba(255,255,255,.3);"></span>' : '🖨 Print All (' + printQueue.reduce((a,q)=>a+q.copies,0) + ')'}
      </button>
      <button class="btn btn-secondary" onclick="clearQueue()" style="flex:.4;">Clear</button>
    `;
  } else {
    bar.style.display = 'none';
  }
}

// ══════════════════════════════════════════════════════════
// PRINT QUEUE
// ══════════════════════════════════════════════════════════
function addToQueue() {
  if (!selectedCard) return;
  // Check if already in queue
  const existing = printQueue.find(q => q.card.id === selectedCard.id);
  if (existing) {
    existing.copies = Math.min(10, existing.copies + printCopies);
  } else {
    printQueue.push({ card: selectedCard, copies: printCopies });
  }
  updateQueueNav();
  updateActionBar();
  renderResults(); // Update Q badges
  // Brief visual feedback
  const btn = document.querySelector('.action-bar .btn-secondary');
  if (btn) {
    btn.textContent = '✓ Added';
    btn.style.borderColor = 'var(--accent-border)';
    btn.style.color = 'var(--accent)';
    setTimeout(() => { btn.textContent = '+ Queue'; btn.style.borderColor = ''; btn.style.color = ''; }, 1200);
  }
}

function removeFromQueue(idx) {
  printQueue.splice(idx, 1);
  renderQueue();
  updateQueueNav();
  updateActionBar();
  renderResults();
}

function clearQueue() {
  printQueue = [];
  renderQueue();
  updateQueueNav();
  updateActionBar();
  renderResults();
}

function renderQueue() {
  const area = document.getElementById('queue-list-area');
  if (!printQueue.length) {
    area.innerHTML = '<div class="queue-empty">No cards in queue — search and add cards to print</div>';
    return;
  }
  area.innerHTML = printQueue.map((item, i) => {
    const card = item.card;
    const img = getCardImage(card, 0, 'normal');
    const dfc = isDFC(card);
    return `<div class="queue-item">
      <div class="queue-thumb"><img src="${esc(img)}" alt="${esc(card.name)}" loading="lazy"></div>
      <div class="queue-info">
        <div class="queue-name">${esc(card.name)}${dfc ? ' <span class="dfc-badge">↷</span>' : ''}</div>
        <div class="queue-type">${esc(card.type_line || '')}</div>
      </div>
      <div class="queue-copies">×${item.copies}</div>
      <button class="queue-remove" onclick="removeFromQueue(${i})" title="Remove">✕</button>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════════════════
// PRINT — DIRECT (from detail)
// ══════════════════════════════════════════════════════════
async function printSelected() {
  if (!selectedCard || printing) return;
  printing = true;
  updateActionBar();

  const card = selectedCard;
  const dfc = isDFC(card);
  const copies = printCopies;

  try {
    if (dfc) {
      const frontUrl = getCardImage(card, 0, 'large');
      const backUrl = getCardImage(card, 1, 'large');
      for (let i = 0; i < copies; i++) {
        await autoPrintDFC(frontUrl, backUrl);
        if (i < copies - 1) await sleep(500);
      }
    } else {
      const imgUrl = getCardImage(card, 0, 'large');
      // Dither once, print copies
      await printCopiesOf(imgUrl, copies);
    }
  } catch(e) {
    console.error('Print error:', e);
  }

  printing = false;
  updateActionBar();
}

// ══════════════════════════════════════════════════════════
// PRINT — QUEUE (one by one)
// ══════════════════════════════════════════════════════════
async function printAllQueue() {
  if (!printQueue.length || printing) return;
  printing = true;
  updateActionBar();

  const statusArea = document.getElementById('queue-status-area');

  for (let qi = 0; qi < printQueue.length; qi++) {
    const item = printQueue[qi];
    const card = item.card;
    const dfc = isDFC(card);
    const copies = item.copies;

    statusArea.innerHTML = `<div class="status-card printing">
      <span class="spinner spinner-lg"></span><br>
      <span class="status-msg" style="margin-top:12px;display:inline-block;">
        Printing ${esc(card.name)} (${qi+1}/${printQueue.length})…
      </span>
    </div>`;

    try {
      if (dfc) {
        const frontUrl = getCardImage(card, 0, 'large');
        const backUrl = getCardImage(card, 1, 'large');
        for (let i = 0; i < copies; i++) {
          await autoPrintDFC(frontUrl, backUrl);
          if (i < copies - 1) await sleep(500);
        }
      } else {
        const imgUrl = getCardImage(card, 0, 'large');
        await printCopiesOf(imgUrl, copies);
      }
    } catch(e) {
      console.error('Print error:', e);
    }

    if (qi < printQueue.length - 1) await sleep(300);
  }

  statusArea.innerHTML = `<div class="status-card done">
    <span class="status-icon">✓</span>
    <span class="status-msg">All cards printed</span>
  </div>`;
  setTimeout(() => { statusArea.innerHTML = ''; }, 3000);

  printing = false;
  updateActionBar();
}

// ══════════════════════════════════════════════════════════
// PRINT INFRASTRUCTURE (exact from momir-papir.html)
// ══════════════════════════════════════════════════════════

function ditherImage(imgUrl) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const paper = PAPER[paperKey].total;
      const cardW = Math.min(CARD_W, paper);
      const cardH = Math.round((img.naturalHeight / img.naturalWidth) * cardW);

      const cardCv = document.createElement('canvas');
      cardCv.width = cardW; cardCv.height = cardH;
      const cardCtx = cardCv.getContext('2d');
      cardCtx.drawImage(img, 0, 0, cardW, cardH);
      const imageData = cardCtx.getImageData(0, 0, cardW, cardH);
      const d = imageData.data;

      const gamma = 0.82, brightness = 5;
      for (let i = 0; i < d.length; i += 4) {
        let g = 0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2];
        g = 255 * Math.pow(g/255, gamma);
        g = Math.min(255, g + brightness);
        d[i] = d[i+1] = d[i+2] = g;
      }

      for (let y = 0; y < cardH; y++) {
        for (let x = 0; x < cardW; x++) {
          const idx = (y*cardW+x)*4;
          const old = d[idx];
          const nw = old < 120 ? 0 : 255;
          d[idx] = d[idx+1] = d[idx+2] = nw;
          const err = old - nw;
          if (x+1<cardW)                  d[idx+4]          += err*7/16;
          if (y+1<cardH && x>0)          d[idx+cardW*4-4]   += err*3/16;
          if (y+1<cardH)                 d[idx+cardW*4]     += err*5/16;
          if (y+1<cardH && x+1<cardW)    d[idx+cardW*4+4]   += err*1/16;
        }
      }
      cardCtx.putImageData(imageData, 0, 0);

      if (paper > cardW) {
        const padL = Math.round((paper - cardW) / 2);
        const outCv = document.createElement('canvas');
        outCv.width = paper; outCv.height = cardH;
        const outCtx = outCv.getContext('2d');
        outCtx.fillStyle = '#fff';
        outCtx.fillRect(0, 0, paper, cardH);
        outCtx.drawImage(cardCv, padL, 0);
        resolve(outCv.toDataURL('image/png'));
      } else {
        resolve(cardCv.toDataURL('image/png'));
      }
    };
    img.onerror = () => reject(new Error('Image load failed'));
    img.src = imgUrl;
  });
}

function receiptHtml(imgTag) {
  return '<div class="receipt">' + imgTag + '<div class="r-sep"></div></div>';
}

async function waitForPrintImages(root) {
  const imgs = Array.from(root.querySelectorAll('img'));
  await Promise.all(imgs.map(async (img) => {
    if (!img.complete || !img.naturalWidth) {
      await new Promise((resolve, reject) => {
        const onLoad = () => { img.removeEventListener('load', onLoad); img.removeEventListener('error', onError); resolve(); };
        const onError = () => { img.removeEventListener('load', onLoad); img.removeEventListener('error', onError); reject(new Error('Image load failed')); };
        img.addEventListener('load', onLoad, { once: true });
        img.addEventListener('error', onError, { once: true });
      });
    }
    if (typeof img.decode === 'function') {
      try { await img.decode(); } catch (_) {}
    }
  }));
}

function doPrint() {
  let s = document.getElementById('dynamic-page-style');
  if (!s) {
    s = document.createElement('style');
    s.id = 'dynamic-page-style';
    document.head.appendChild(s);
  }
  s.textContent = `
    @page { margin: 0 0 50mm 0; }
    .receipt {
      break-after:page;
      page-break-after:always;
    }
  `;
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      window.print();
      setTimeout(() => { s.textContent = ''; }, 2000);
    });
  });
}

async function autoPrint(imgUrl) {
  const z = document.getElementById('print-zone');
  try {
    const dithered = await ditherImage(imgUrl);
    z.innerHTML = receiptHtml('<img class="r-img" src="' + dithered + '">');
  } catch(e) {
    z.innerHTML = receiptHtml('<img class="r-img" crossorigin="anonymous" src="' + imgUrl + '" style="filter:grayscale(1) brightness(1.3);">');
  }
  await waitForPrintImages(z);
  doPrint();
}

async function autoPrintDFC(frontUrl, backUrl) {
  await autoPrint(frontUrl);
  await new Promise(r => {
    const done = () => { window.removeEventListener('afterprint', done); r(); };
    window.addEventListener('afterprint', done);
    setTimeout(r, 3000);
  });
  await autoPrint(backUrl);
}

// Print multiple copies of a non-DFC card
// Each copy is a separate receipt but in one print job (thermal printer handles page breaks)
async function printCopiesOf(imgUrl, copies) {
  const z = document.getElementById('print-zone');
  try {
    const dithered = await ditherImage(imgUrl);
    let h = '';
    for (let i = 0; i < copies; i++) {
      h += receiptHtml('<img class="r-img" src="' + dithered + '">');
    }
    z.innerHTML = h;
  } catch(e) {
    let h = '';
    for (let i = 0; i < copies; i++) {
      h += receiptHtml('<img class="r-img" crossorigin="anonymous" src="' + imgUrl + '" style="filter:grayscale(1) brightness(1.3);">');
    }
    z.innerHTML = h;
  }
  await waitForPrintImages(z);
  doPrint();
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
